<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Invited to HairFlow</title>
  <meta name="description" content="Your friend invited you to HairFlow. See yourself with any hairstyle using AI — try it free.">
  <meta name="theme-color" content="#0A0A0A">
  <meta property="og:title" content="You're Invited to HairFlow">
  <meta property="og:description" content="Your friend invited you to try HairFlow — see yourself with any hairstyle using AI. Download now and get free looks!">
  <meta property="og:image" content="/icon.png">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="apple-touch-icon" href="/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0A0A0A;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    /* Ambient glow effects — matching landing page */
    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .glow-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(212,175,55,0.12) 0%, transparent 70%);
      top: -150px; left: -100px;
    }
    .glow-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(212,175,55,0.08) 0%, transparent 70%);
      bottom: -100px; right: -80px;
    }

    /* Film grain texture */
    .grain {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }
    .logo-mark {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, #D4AF37 0%, #B8960C 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(212,175,55,0.25);
    }
    .logo-img {
      width: 52px; height: 52px;
      object-fit: contain;
    }
    .logo-line {
      width: 40px; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent);
      margin-top: 20px;
    }

    .invite-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(212,175,55,0.12);
      border: 1px solid rgba(212,175,55,0.2);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      color: #D4AF37;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 36px;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 16px;
    }
    .title-accent {
      background: linear-gradient(135deg, #D4AF37, #F5E6A3, #D4AF37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-style: italic;
    }

    .subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .store-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .store-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 24px;
      border-radius: 14px;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: #fff;
    }
    .store-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(212,175,55,0.15);
    }
    .store-btn-primary {
      background: linear-gradient(135deg, #D4AF37, #B8960C);
      color: #0A0A0A;
      border: none;
      box-shadow: 0 4px 24px rgba(212,175,55,0.3);
    }
    .store-btn-primary:hover {
      box-shadow: 0 6px 32px rgba(212,175,55,0.4);
    }
    .store-btn-text {
      display: flex;
      flex-direction: column;
      text-align: left;
    }
    .store-btn-small {
      font-size: 10px;
      opacity: 0.8;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .store-btn-big {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.2;
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      display: flex;
      justify-content: center;
      gap: 16px;
      align-items: center;
      z-index: 1;
    }
    .footer-link {
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      font-size: 12px;
    }
    .footer-link:hover { color: rgba(255,255,255,0.6); }
    .footer-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
    }

    .referral-code-box {
      background: rgba(212,175,55,0.1);
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 12px;
      padding: 12px 20px;
      margin-bottom: 24px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .referral-code-label {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }
    .referral-code-value {
      font-size: 18px;
      font-weight: 700;
      color: #D4AF37;
      letter-spacing: 2px;
      font-family: 'DM Sans', monospace;
    }

    @media (max-width: 480px) {
      h1 { font-size: 28px; }
      .store-buttons { flex-direction: column; align-items: center; }
      .store-btn { width: 100%; max-width: 260px; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="grain"></div>

  <div class="container">
    <div class="logo-wrap">
      <div class="logo-mark">
        <img src="/logo.png" alt="HairFlow" class="logo-img">
      </div>
      <div class="logo-line"></div>
    </div>

    <div class="invite-badge" id="invite-badge">Invite</div>

    <h1 id="title">
      See Your<br>
      <span class="title-accent">Perfect Cut</span>
    </h1>

    <p class="subtitle" id="subtitle">
      A friend invited you to try HairFlow.<br>
      Visualize any hairstyle on yourself with AI.
    </p>

    <div class="referral-code-box" id="referral-code-box" style="display:none;">
      <span class="referral-code-label" id="referral-code-label">Your referral code:</span>
      <span class="referral-code-value" id="referral-code-value"></span>
    </div>

    <div class="store-buttons" id="store-buttons">
      <a href="https://apps.apple.com/app/hairflow/id6756860185" id="btn-ios" class="store-btn store-btn-primary" aria-label="Download on the App Store">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        <span class="store-btn-text">
          <span class="store-btn-small" id="ios-label">Download on the</span>
          <span class="store-btn-big">App Store</span>
        </span>
      </a>
      <a href="https://play.google.com/store/apps/details?id=com.hairflow.app" id="btn-android" class="store-btn" aria-label="Get it on Google Play">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M3.609 1.814L13.792 12 3.61 22.186a.996.996 0 0 1-.61-.92V2.734a1 1 0 0 1 .609-.92zm10.89 10.893l2.302 2.302-10.937 6.333 8.635-8.635zm3.199-3.199l2.302 2.302a1 1 0 0 1 0 1.38l-2.302 2.302L15.395 13l2.303-2.492zM5.864 2.658L16.8 9.99l-2.302 2.302-8.634-8.634z"/></svg>
        <span class="store-btn-text">
          <span class="store-btn-small" id="android-label">Get it on</span>
          <span class="store-btn-big">Google Play</span>
        </span>
      </a>
    </div>
  </div>

  <footer class="footer">
    <a href="https://hairflow.app/privacy" class="footer-link" id="footer-privacy">Privacy</a>
    <span class="footer-dot"></span>
    <a href="mailto:contact@hairflow.app" class="footer-link">Contact</a>
  </footer>

  <script>
    var translations = {
      en: {
        pageTitle: "You're Invited to HairFlow",
        badge: 'Invite',
        title: 'See Your<br><span class="title-accent">Perfect Cut</span>',
        subtitle: 'A friend invited you to try HairFlow.<br>Visualize any hairstyle on yourself with AI.',
        codeLabel: 'Enter this code when signing up:',
        iosLabel: 'Download on the',
        androidLabel: 'Get it on',
        privacy: 'Privacy',
      },
      fr: {
        pageTitle: 'Vous etes invite(e) sur HairFlow',
        badge: 'Invitation',
        title: 'Visualisez Votre<br><span class="title-accent">Coupe Parfaite</span>',
        subtitle: 'Un ami vous invite a essayer HairFlow.<br>Visualisez n\'importe quelle coiffure sur vous avec l\'IA.',
        codeLabel: 'Entrez ce code lors de l\'inscription :',
        iosLabel: 'Telecharger sur l\'',
        androidLabel: 'Disponible sur',
        privacy: 'Confidentialite',
      }
    };

    function detectLang() {
      var nav = navigator.language || navigator.userLanguage || 'en';
      return nav.toLowerCase().startsWith('fr') ? 'fr' : 'en';
    }

    function detectPlatform() {
      var ua = navigator.userAgent.toLowerCase();
      if (/iphone|ipad|ipod/.test(ua)) return 'ios';
      if (/android/.test(ua)) return 'android';
      return 'desktop';
    }

    function init() {
      var lang = detectLang();
      var platform = detectPlatform();
      var t = translations[lang];

      document.documentElement.lang = lang;
      document.title = t.pageTitle;

      document.getElementById('invite-badge').textContent = t.badge;
      document.getElementById('title').innerHTML = t.title;
      document.getElementById('subtitle').innerHTML = t.subtitle;
      document.getElementById('ios-label').textContent = t.iosLabel;
      document.getElementById('android-label').textContent = t.androidLabel;
      document.getElementById('footer-privacy').textContent = t.privacy;

      // Show referral code extracted from URL
      var code = window.location.pathname.split('/invite/')[1];
      if (code) {
        document.getElementById('referral-code-value').textContent = code.toUpperCase();
        document.getElementById('referral-code-label').textContent = t.codeLabel;
        document.getElementById('referral-code-box').style.display = 'inline-flex';
      }

      // Show only relevant store button on mobile
      if (platform === 'ios') {
        document.getElementById('btn-android').style.display = 'none';
      } else if (platform === 'android') {
        document.getElementById('btn-ios').style.display = 'none';
      }

      // Copy referral code to clipboard so the app can detect it after install
      if (code && navigator.clipboard) {
        navigator.clipboard.writeText('HAIRFLOW-' + code.toUpperCase()).catch(function() {});
      }

      // Deep link fallback (Universal/App Links handle most cases)
      if (code) {
        window.location.href = 'hairflow://invite/' + code;
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
